# Promtail 配置文件
# 新能源监控系统 - 日志采集

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 系统日志
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

  # 应用日志 (Docker 容器)
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          source: tag
          expression: '^(?P<container_name>[^\|]+)\|(?P<image_name>[^\|]+)\|(?P<container_id>[^\|]+)'
      - labels:
          tag:
          container_name:
          image_name:
          container_id:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano

  # 应用服务日志
  - job_name: api-server
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-server
          service: api-server
          __path__: /var/log/api-server/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          source: time
          format: '2006-01-02 15:04:05'

  - job_name: collector
    static_configs:
      - targets:
          - localhost
        labels:
          job: collector
          service: collector
          __path__: /var/log/collector/*.log

  - job_name: compute-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: compute-service
          service: compute-service
          __path__: /var/log/compute-service/*.log

  - job_name: alarm-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: alarm-service
          service: alarm-service
          __path__: /var/log/alarm-service/*.log

  - job_name: ai-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai-service
          service: ai-service
          __path__: /var/log/ai-service/*.log

  - job_name: scheduler
    static_configs:
      - targets:
          - localhost
        labels:
          job: scheduler
          service: scheduler
          __path__: /var/log/scheduler/*.log
