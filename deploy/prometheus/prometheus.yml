# Prometheus 配置文件
# 新能源监控系统 - 可观测性配置

global:
  scrape_interval: 15s      # 默认采集间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    monitor: 'new-energy-monitoring'
    environment: 'production'

# 告警规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 采集配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
          service: 'monitoring'

  # API Server 服务监控
  - job_name: 'api-server'
    static_configs:
      - targets: ['api-server:8080']
        labels:
          service: 'api-server'
          component: 'backend'
    metrics_path: /metrics
    scrape_interval: 10s

  # 数据采集服务监控
  - job_name: 'collector'
    static_configs:
      - targets: ['collector:8081']
        labels:
          service: 'collector'
          component: 'data-ingestion'
    metrics_path: /metrics
    scrape_interval: 10s

  # 计算服务监控
  - job_name: 'compute-service'
    static_configs:
      - targets: ['compute-service:8082']
        labels:
          service: 'compute-service'
          component: 'data-processing'
    metrics_path: /metrics
    scrape_interval: 10s

  # 告警服务监控
  - job_name: 'alarm-service'
    static_configs:
      - targets: ['alarm-service:8083']
        labels:
          service: 'alarm-service'
          component: 'alerting'
    metrics_path: /metrics
    scrape_interval: 10s

  # AI 服务监控
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8084']
        labels:
          service: 'ai-service'
          component: 'ai-engine'
    metrics_path: /metrics
    scrape_interval: 10s

  # 调度服务监控
  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8085']
        labels:
          service: 'scheduler'
          component: 'scheduling'
    metrics_path: /metrics
    scrape_interval: 10s

  # PostgreSQL 数据库监控 (使用 postgres_exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
          component: 'database'

  # Redis 缓存监控 (使用 redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          component: 'cache'

  # Kafka 消息队列监控 (使用 kafka_exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: 'kafka'
          component: 'message-queue'

  # Node Exporter - 系统级指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'system'

  # cAdvisor - 容器指标
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          component: 'container'

# 远程写入配置 (可选，用于长期存储)
