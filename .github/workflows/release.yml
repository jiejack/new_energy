name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          mkdir -p dist
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-api-server-linux-amd64 ./cmd/api-server
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-collector-linux-amd64 ./cmd/collector
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-alarm-linux-amd64 ./cmd/alarm
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-compute-linux-amd64 ./cmd/compute
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-scheduler-linux-amd64 ./cmd/scheduler
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/nem-api-server-linux-arm64 ./cmd/api-server
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/nem-collector-linux-arm64 ./cmd/collector
          
          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/nem-api-server-windows-amd64.exe ./cmd/api-server
          
          # Create archives
          cd dist
          tar -czvf nem-linux-amd64.tar.gz nem-*-linux-amd64
          tar -czvf nem-linux-arm64.tar.gz nem-*-linux-arm64
          zip nem-windows-amd64.zip nem-*-windows-amd64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## Downloads
            - [Linux AMD64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nem-linux-amd64.tar.gz)
            - [Linux ARM64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nem-linux-arm64.tar.gz)
            - [Windows AMD64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nem-windows-amd64.zip)
            
            ## Docker Images
            ```bash
            docker pull ${{ github.repository }}:${{ github.ref_name }}
            ```
          files: |
            dist/nem-linux-amd64.tar.gz
            dist/nem-linux-arm64.tar.gz
            dist/nem-windows-amd64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
