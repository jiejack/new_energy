name: CD

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 构建并推送Docker镜像
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到Kubernetes
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://nem.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Create namespace if not exists
        run: |
          kubectl create namespace nem-production --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install nem ./deployments/kubernetes/helm \
            --namespace nem-production \
            --values ./deployments/kubernetes/helm/values-prod.yaml \
            --set image.tag=${{ github.ref_name }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-server -n nem-production
          kubectl rollout status deployment/collector -n nem-production
          kubectl rollout status deployment/alarm -n nem-production
          kubectl rollout status deployment/compute -n nem-production
          kubectl rollout status deployment/ai-service -n nem-production
          kubectl rollout status deployment/scheduler -n nem-production

      - name: Get deployment status
        run: |
          kubectl get pods -n nem-production
          kubectl get services -n nem-production
          kubectl get ingress -n nem-production

  # 部署通知
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-kubernetes]
    if: always()

    steps:
      - name: Send success notification
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Version: ${{ github.ref_name }}"
          echo "Environment: production"

      - name: Send failure notification
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Version: ${{ github.ref_name }}"
          echo "Environment: production"
