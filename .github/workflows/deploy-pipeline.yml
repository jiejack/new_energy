name: Full Deploy Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'localhost:5000' }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: nem_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if [ $(echo "$COVERAGE < 70" | bc -l) -eq 1 ]; then
            echo "::error::Coverage $COVERAGE% is below 70% threshold."
            exit 1
          fi
          echo "::notice::Coverage check passed: $COVERAGE%"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Run frontend linter
        working-directory: ./web
        run: npm run lint --if-present

      - name: Run frontend tests
        working-directory: ./web
        run: npm run test:run

      - name: Build frontend
        working-directory: ./web
        run: npm run build

  build-and-push:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/nem-api-server
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-api-server:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-api-server:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Collector
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.collector
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-collector:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-collector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Alarm
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.alarm
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-alarm:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-alarm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Compute
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.compute
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-compute:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-compute:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ai-service
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-ai-service:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.scheduler
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-scheduler:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-scheduler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nem-frontend:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/nem-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image:.*nem-api-server.*|image: ${{ env.DOCKER_REGISTRY }}/nem-api-server:${{ github.sha }}|g" k8s/07-api-server.yaml
          sed -i "s|image:.*nem-collector.*|image: ${{ env.DOCKER_REGISTRY }}/nem-collector:${{ github.sha }}|g" k8s/08-microservices.yaml
          sed -i "s|image:.*nem-alarm.*|image: ${{ env.DOCKER_REGISTRY }}/nem-alarm:${{ github.sha }}|g" k8s/08-microservices.yaml
          sed -i "s|image:.*nem-compute.*|image: ${{ env.DOCKER_REGISTRY }}/nem-compute:${{ github.sha }}|g" k8s/08-microservices.yaml
          sed -i "s|image:.*nem-ai-service.*|image: ${{ env.DOCKER_REGISTRY }}/nem-ai-service:${{ github.sha }}|g" k8s/08-microservices.yaml
          sed -i "s|image:.*nem-scheduler.*|image: ${{ env.DOCKER_REGISTRY }}/nem-scheduler:${{ github.sha }}|g" k8s/08-microservices.yaml
          sed -i "s|image:.*nem-frontend.*|image: ${{ env.DOCKER_REGISTRY }}/nem-frontend:${{ github.sha }}|g" k8s/09-frontend-monitoring.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/01-namespace.yaml
          kubectl apply -f k8s/02-configmap.yaml
          kubectl apply -f k8s/03-secrets.yaml
          kubectl apply -f k8s/04-postgres.yaml
          kubectl apply -f k8s/05-redis.yaml
          kubectl apply -f k8s/06-kafka.yaml
          sleep 15
          kubectl apply -f k8s/07-api-server.yaml
          kubectl apply -f k8s/08-microservices.yaml
          kubectl apply -f k8s/09-frontend-monitoring.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-server -n nem-system --timeout=5m
          kubectl rollout status deployment/collector -n nem-system --timeout=5m
          kubectl rollout status deployment/alarm -n nem-system --timeout=5m
          kubectl rollout status deployment/compute -n nem-system --timeout=5m
          kubectl rollout status deployment/ai-service -n nem-system --timeout=5m
          kubectl rollout status deployment/scheduler -n nem-system --timeout=5m
          kubectl rollout status deployment/frontend -n nem-system --timeout=5m
          kubectl get all -n nem-system
