        type: string
      operator:
        example: admin
        type: string
    required:
    - operator
    type: object
  dto.ConfigSuggestion:
    properties:
      current_value: {}
      name:
        example: 温度告警阈值
        type: string
      priority:
        example: 1
        type: integer
      reason:
        example: 根据历史数据分析，建议提高阈值以减少误报
        type: string
      suggested_value: {}
      type:
        example: alarm_threshold
        type: string
