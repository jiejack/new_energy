host: localhost:8080
info:
  contact:
    email: support@new-energy-monitoring.com
    name: API支持团队
    url: http://www.new-energy-monitoring.com/support
  description: 新能源监控系统RESTful API接口文档，提供区域管理、厂站管理、设备管理、采集点管理、告警管理、数据查询等功能。
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: 新能源监控系统 API
  version: "1.0"
paths:
  /ai/config/suggest:
    post:
      consumes:
      - application/json
      description: 智能配置建议服务
      parameters:
      - description: 配置建议请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AIConfigSuggestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AIConfigSuggestResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: AI配置建议
      tags:
      - AI服务
  /ai/qa:
    post:
      consumes:
      - application/json
      description: 智能问答服务
      parameters:
      - description: 问答请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AIQARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AIQAResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: AI问答
      tags:
      - AI服务
  /alarms:
    get:
      consumes:
      - application/json
      description: 获取所有告警的列表，支持分页和过滤
      parameters:
      - description: 厂站ID
        in: query
        name: station_id
        type: string
      - description: 设备ID
        in: query
        name: device_id
        type: string
      - description: 告警级别
        in: query
        name: level
        type: integer
      - description: 状态
        in: query
        name: status
        type: integer
      - description: 告警类型
        in: query
        name: type
        type: string
      - description: 开始时间戳
        in: query
        name: start_time
        type: integer
      - description: 结束时间戳
        in: query
        name: end_time
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.PagedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AlarmResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取告警列表
      tags:
      - 告警管理
  /alarms/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取告警详细信息
      parameters:
      - description: 告警ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
