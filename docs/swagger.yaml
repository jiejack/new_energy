basePath: /api/v1
definitions:
  dto.AIConfigSuggestRequest:
    properties:
      context:
        example: 设备温度过高
        type: string
      device_id:
        example: device-001
        type: string
      type:
        example: alarm
        type: string
    required:
    - device_id
    type: object
  dto.AIConfigSuggestResponse:
    properties:
      suggestions:
        items:
          $ref: '#/definitions/dto.ConfigSuggestion'
        type: array
    type: object
  dto.AIQARequest:
    properties:
      context:
        example: 逆变器温度过高
        type: string
      question:
        example: 1号逆变器为什么报警？
        type: string
      session_id:
        example: session-001
        type: string
    required:
    - question
    type: object
  dto.AIQAResponse:
    properties:
      answer:
        example: 1号逆变器温度为87.5°C，已超过85°C阈值。
        type: string
      confidence:
        example: 0.95
        type: number
      session_id:
        example: session-001
        type: string
    type: object
  dto.AckAlarmRequest:
    properties:
      comment:
        example: 已确认，正在处理
        type: string
      operator:
        example: admin
        type: string
    required:
    - operator
    type: object
  dto.AlarmResponse:
    properties:
      acknowledged_at:
        type: string
      acknowledged_by:
        example: admin
        type: string
      cleared_at:
        type: string
      created_at:
        type: string
      device_id:
        example: device-001
        type: string
      id:
        example: alarm-001
        type: string
      level:
        example: 3
        type: integer
      message:
        example: 逆变器温度为87.5°C，已超过85°C阈值
        type: string
      point_id:
        example: point-001
        type: string
      station_id:
        example: station-001
        type: string
      status:
        example: 1
        type: integer
      threshold:
        example: 85
        type: number
      title:
        example: 逆变器温度过高
        type: string
      triggered_at:
        type: string
      type:
        example: limit
        type: string
      value:
        example: 87.5
        type: number
    type: object
  dto.AlarmStatisticsResponse:
    properties:
      acknowledged:
        example: 20
        type: integer
      active:
        example: 15
        type: integer
      by_level:
        additionalProperties:
          format: int64
          type: integer
        type: object
      by_type:
        additionalProperties:
          format: int64
          type: integer
        type: object
      cleared:
        example: 65
        type: integer
      total:
        example: 100
        type: integer
    type: object
  dto.ChangePasswordRequest:
    properties:
      new_password:
        example: newpass123
