openapi: 3.0.0
info:
  title: New Energy Monitoring System API
  description: API documentation for the New Energy Monitoring System
  version: 1.0.0
  contact:
    name: Support
    email: support@newenergy.com

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://api.newenergy.com
    description: Production server

paths:
  /devices:
    get:
      summary: Get all devices
      description: Retrieve a list of all devices in the system
      tags:
        - Devices
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
    post:
      summary: Create a new device
      description: Add a new device to the system
      tags:
        - Devices
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: Device created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /devices/{id}:
    get:
      summary: Get device by ID
      description: Retrieve a specific device by its ID
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Device ID
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          description: Unauthorized
        '404':
          description: Device not found
        '500':
          description: Internal server error
    put:
      summary: Update device
      description: Update an existing device
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Device ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Device not found
        '500':
          description: Internal server error
    delete:
      summary: Delete device
      description: Remove a device from the system
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Device ID
      responses:
        '200':
          description: Device deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Device not found
        '500':
          description: Internal server error
  /energy/data:
    get:
      summary: Get energy data
      description: Retrieve energy consumption data
      tags:
        - Energy
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: start_time
          required: true
          schema:
            type: string
            format: date-time
          description: Start time for data range
        - in: query
          name: end_time
          required: true
          schema:
            type: string
            format: date-time
          description: End time for data range
        - in: query
          name: device_id
          schema:
            type: string
          description: Filter by device ID
      responses:
        '200':
          description: Energy data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnergyData'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
    post:
      summary: Add energy data
      description: Add new energy consumption data
      tags:
        - Energy
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnergyDataCreate'
      responses:
        '201':
          description: Energy data created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnergyData'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /alerts:
    get:
      summary: Get alerts
      description: Retrieve alerts
      tags:
        - Alerts
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, resolved]
          description: Filter by alert status
        - in: query
          name: device_id
          schema:
            type: string
          description: Filter by device ID
      responses:
        '200':
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
    post:
      summary: Create alert
      description: Create a new alert
      tags:
        - Alerts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertCreate'
      responses:
        '201':
          description: Alert created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /alerts/{id}:
    put:
      summary: Update alert status
      description: Update the status of an alert
      tags:
        - Alerts
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Alert ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertUpdate'
      responses:
        '200':
          description: Alert updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Alert not found
        '500':
          description: Internal server error
  /users:
    get:
      summary: Get users
      description: Retrieve a list of users
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
    post:
      summary: Create user
      description: Create a new user
      tags:
        - Users
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieve a specific user by ID
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '404':
          description: User not found
        '500':
          description: Internal server error
    put:
      summary: Update user
      description: Update an existing user
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: User not found
        '500':
          description: Internal server error
    delete:
      summary: Delete user
      description: Remove a user from the system
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: User not found
        '500':
          description: Internal server error
  /auth/login:
    post:
      summary: Login
      description: Authenticate and get a JWT token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  refresh_token:
                    type: string
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /auth/refresh:
    post:
      summary: Refresh token
      description: Refresh an existing JWT token
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
                - refresh_token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /metrics:
    get:
      summary: Get metrics
      description: Retrieve system metrics for monitoring
      tags:
        - Monitoring
      responses:
        '200':
          description: Metrics data
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        location:
          type: string
        status:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - location
    DeviceCreate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        location:
          type: string
      required:
        - name
        - type
        - location
    DeviceUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        location:
          type: string
        status:
          type: string
    EnergyData:
      type: object
      properties:
        id:
          type: string
        device_id:
          type: string
        timestamp:
          type: string
          format: date-time
        value:
          type: number
        unit:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - device_id
        - timestamp
        - value
        - unit
    EnergyDataCreate:
      type: object
      properties:
        device_id:
          type: string
        timestamp:
          type: string
          format: date-time
        value:
          type: number
        unit:
          type: string
      required:
        - device_id
        - timestamp
        - value
        - unit
    Alert:
      type: object
      properties:
        id:
          type: string
        device_id:
          type: string
        type:
          type: string
        message:
          type: string
        status:
          type: string
        severity:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - device_id
        - type
        - message
        - status
        - severity
    AlertCreate:
      type: object
      properties:
        device_id:
          type: string
        type:
          type: string
        message:
          type: string
        severity:
          type: string
      required:
        - device_id
        - type
        - message
        - severity
    AlertUpdate:
      type: object
      properties:
        status:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - role
    UserCreate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
      required:
        - username
        - email
        - password
        - role
    UserUpdate:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
