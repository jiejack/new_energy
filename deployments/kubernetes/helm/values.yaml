# 全局配置
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  namespace: new-energy-monitoring

# 命名空间配置
namespace:
  create: true
  name: new-energy-monitoring

# API服务器配置
apiServer:
  replicaCount: 3
  image:
    repository: nem/api-server
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # 健康检查配置
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /health/ready
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  
  # 滚动更新策略
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # 环境变量
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: GIN_MODE
      value: "release"
  
  # 配置引用
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  # Pod配置
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # 服务账户
  serviceAccount:
    create: true
    name: ""

# 数据采集器配置
collector:
  replicaCount: 2
  image:
    repository: nem/collector
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8081
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      enabled: true
      path: /health/ready
      port: 8081
      initialDelaySeconds: 10
      periodSeconds: 5
  
  env:
    - name: LOG_LEVEL
      value: "info"
  
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# 告警服务配置
alarmService:
  replicaCount: 2
  image:
    repository: nem/alarm-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8082
    targetPort: 8082
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8082
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      enabled: true
      path: /health/ready
      port: 8082
      initialDelaySeconds: 10
      periodSeconds: 5
  
  env:
    - name: LOG_LEVEL
      value: "info"
  
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# 计算服务配置
computeService:
  replicaCount: 2
  image:
    repository: nem/compute-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8083
    targetPort: 8083
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8083
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      enabled: true
      path: /health/ready
      port: 8083
      initialDelaySeconds: 10
      periodSeconds: 5
  
  env:
    - name: LOG_LEVEL
      value: "info"
  
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# AI服务配置
aiService:
  replicaCount: 2
  image:
    repository: nem/ai-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8084
    targetPort: 8084
  
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
      nvidia.com/gpu: 1
    requests:
      cpu: 2000m
      memory: 4Gi
  
  autoscaling:
    enabled: false
  
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8084
      initialDelaySeconds: 60
      periodSeconds: 15
    readiness:
      enabled: true
      path: /health/ready
      port: 8084
      initialDelaySeconds: 30
      periodSeconds: 10
  
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: AI_MODEL_PATH
      value: "/app/models"
  
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  # 模型存储卷
  volumes:
    - name: ai-models
      emptyDir: {}
  
  podAnnotations: {}
  podLabels: {}
  nodeSelector:
    accelerator: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  affinity: {}

# 调度服务配置
scheduler:
  replicaCount: 1
  image:
    repository: nem/scheduler
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8085
    targetPort: 8085
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  healthCheck:
    liveness:
      enabled: true
      path: /health/live
      port: 8085
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      enabled: true
      path: /health/ready
      port: 8085
      initialDelaySeconds: 10
      periodSeconds: 5
  
  env:
    - name: LOG_LEVEL
      value: "info"
  
  configFrom:
    configMapRef: nem-config
    secretRef: nem-secrets
  
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# PostgreSQL配置
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    username: nem
    password: nem123456
    database: nem_system
  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 100Gi
    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
      requests:
        cpu: 2000m
        memory: 4Gi
    service:
      type: ClusterIP
      port: 5432

# Redis配置
redis:
  enabled: true
  auth:
    enabled: true
    password: redis123456
  master:
    persistence:
      enabled: true
      storageClass: ""
      size: 20Gi
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
    service:
      type: ClusterIP
      port: 6379
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      storageClass: ""
      size: 20Gi
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

# Kafka配置
kafka:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: ""
    size: 50Gi
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 9092
  zookeeper:
    enabled: true
    replicaCount: 3
    persistence:
      enabled: true
      size: 10Gi

# Ingress配置
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: nem.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api-server
          port: 8080
  tls:
    - secretName: nem-tls
      hosts:
        - nem.example.com

# 监控配置
monitoring:
  enabled: true
  
  # Prometheus ServiceMonitor配置
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: prometheus
  
  # PrometheusRule配置
  prometheusRule:
    enabled: true
    additionalLabels:
      release: prometheus
  
  # Grafana Dashboard配置
  grafana:
    enabled: true
    dashboards:
      enabled: true

# 日志配置
logging:
  enabled: true
  level: info
  format: json

# 镜像拉取策略
imagePullPolicy: IfNotPresent

# Pod安全策略
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# 容器安全策略
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# 优先级类
priorityClassName: ""

# 终止宽限期
terminationGracePeriodSeconds: 30
