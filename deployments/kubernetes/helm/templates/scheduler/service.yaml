apiVersion: v1
kind: Service
metadata:
  name: {{ include "new-energy-monitoring.fullname" . }}-scheduler
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "new-energy-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  type: {{ .Values.scheduler.service.type }}
  ports:
    - port: {{ .Values.scheduler.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "new-energy-monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
