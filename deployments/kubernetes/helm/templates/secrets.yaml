apiVersion: v1
kind: Secret
metadata:
  name: {{ include "new-energy-monitoring.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "new-energy-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  # 数据库密码
  DB_PASSWORD: {{ .Values.postgresql.auth.password | default "nem123456" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.postgresPassword | default "postgres" | b64enc | quote }}
  
  # Redis密码
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default "redis123456" | b64enc | quote }}
  
  # JWT密钥（生产环境应使用随机生成的密钥）
  JWT_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  JWT_REFRESH_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  
  # API密钥
  API_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  
  # 加密密钥
  ENCRYPTION_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  
  # Kafka SASL配置（如果启用）
  {{- if .Values.kafka.sasl.enabled }}
  KAFKA_SASL_USERNAME: {{ .Values.kafka.sasl.username | default "" | b64enc | quote }}
  KAFKA_SASL_PASSWORD: {{ .Values.kafka.sasl.password | default "" | b64enc | quote }}
  {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "new-energy-monitoring.fullname" . }}-db-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "new-energy-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.postgresql.auth.username | default "nem" | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | default "nem123456" | b64enc | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "new-energy-monitoring.fullname" . }}-redis-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "new-energy-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.redis.auth.password | default "redis123456" | b64enc | quote }}
