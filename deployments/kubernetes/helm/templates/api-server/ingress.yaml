{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "new-energy-monitoring.fullname" . }}-api-server
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "new-energy-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "new-energy-monitoring.fullname" $ }}-{{ .service | default "api-server" }}
                port:
                  number: {{ .port | default $.Values.apiServer.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
