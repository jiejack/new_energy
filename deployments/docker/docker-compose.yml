version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nem-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nem_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: nem-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTER: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
      - kafka_data:/bitnami/kafka

  doris-fe:
    image: apache/doris:2.0-fe
    container_name: nem-doris-fe
    ports:
      - "9030:9030"
      - "8030:8030"
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      FE_ID: 1

  doris-be:
    image: apache/doris:2.0-be
    container_name: nem-doris-be
    ports:
      - "8040:8040"
    environment:
      FE_SERVERS: fe1:172.20.80.2:9010
      BE_ADDR: 172.20.80.3:9050

  api-server:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-api-server
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GIN_MODE=release
    volumes:
      - ../../configs:/app/configs:ro

  collector:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-collector
    depends_on:
      - kafka
      - redis
    environment:
      - SERVICE_TYPE=collector
    volumes:
      - ../../configs:/app/configs:ro
    entrypoint: ["/app/collector"]

  alarm:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-alarm
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      - SERVICE_TYPE=alarm
    volumes:
      - ../../configs:/app/configs:ro
    entrypoint: ["/app/alarm"]

  compute:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-compute
    depends_on:
      - redis
      - postgres
    environment:
      - SERVICE_TYPE=compute
    volumes:
      - ../../configs:/app/configs:ro
    entrypoint: ["/app/compute"]

  ai-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-ai-service
    depends_on:
      - redis
      - postgres
    environment:
      - SERVICE_TYPE=ai-service
    volumes:
      - ../../configs:/app/configs:ro
    entrypoint: ["/app/ai-service"]

  scheduler:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: nem-scheduler
    depends_on:
      - redis
      - postgres
    environment:
      - SERVICE_TYPE=scheduler
    volumes:
      - ../../configs:/app/configs:ro
    entrypoint: ["/app/scheduler"]

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  default:
    name: nem-network
