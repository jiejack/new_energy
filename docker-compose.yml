# Docker Compose 开发环境配置
# 用于本地开发和测试

services:
  # ================================
  # 数据库服务
  # ================================
  postgres:
    image: docker.1ms.run/library/postgres:18.3-alpine3.23
    container_name: nem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nem_system
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nem_system"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nem-network

  # ================================
  # 缓存服务
  # ================================
  redis:
    image: docker.1ms.run/library/redis:8.6.2-alpine3.23
    container_name: nem-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nem-network

  # ================================
  # 消息队列服务 - Kafka
  # ================================
  kafka:
    image: docker.1ms.run/apache/kafka-native:4.2.0
    container_name: nem-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nem-network

  # ================================
  # 消息队列服务 - NATS
  # ================================
  nats:
    image: docker.1ms.run/library/nats:alpine3.22
    container_name: nem-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222", "--jetstream", "--store_dir", "/data"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nem-network

  # ================================
  # 注册中心 - Nacos
  # ================================
  nacos:
    image: qingpan/rnacos:v0.8.2-alpine
    container_name: nem-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      RNACOS_INIT_ADMIN_USERNAME: admin
      RNACOS_INIT_ADMIN_PASSWORD: admin123
      RNACOS_HTTP_PORT: 8848
      RNACOS_GRPC_PORT: 9848
      RNACOS_HTTP_WORKERS: 4
    volumes:
      - nacos_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nem-network

  # ================================
  # 流处理 - Flink (单机模式)
  # ================================
  flink:
    image: docker.1ms.run/apache/flink:2.2-java21
    container_name: nem-flink
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: standalone-job
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - flink_data:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nem-network

  # ================================
  # MQTT服务 - EMQX
  # ================================
  emqx:
    image: docker.1ms.run/emqx/emqx:6.2.0
    container_name: nem-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_NAME: nem-emqx
      EMQX_HOST: 0.0.0.0
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nem-network

  # ================================
  # 对象存储服务 - RustFS
  # ================================
  rustfs:
    image: rustfs/rustfs:latest
    container_name: nem-rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
      RUSTFS_REGION: us-east-1
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - nem-network

  # ================================
  # 后端服务
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nem-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
      - NATS_URL=nats://nats:4222
      - NACOS_SERVER=nacos:8848
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nem-network

  # ================================
  # 前端服务
  # ================================
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: nem-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - nem-network

# ================================
# 网络配置
# ================================
networks:
  nem-network:
    driver: bridge
    name: nem-network

# ================================
# 数据卷配置
# ================================
volumes:
  postgres_data:
    name: nem-postgres-data
  redis_data:
    name: nem-redis-data
  kafka_data:
    name: nem-kafka-data
  nats_data:
    name: nem-nats-data
  nacos_data:
    name: nem-nacos-data
  flink_data:
    name: nem-flink-data
  flink_savepoints:
    name: nem-flink-savepoints
  emqx_data:
    name: nem-emqx-data
  emqx_log:
    name: nem-emqx-log
  rustfs_data:
    name: nem-rustfs-data
