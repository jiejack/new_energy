version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nem-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nem_system
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  redis:
    image: redis:7-alpine
    container_name: nem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: nem-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTER: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nem-network

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nem-api-server
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nem-network

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: nem-collector
    depends_on:
      - kafka
      - redis
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_TYPE=collector
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - nem-network

  alarm:
    build:
      context: .
      dockerfile: Dockerfile.alarm
    container_name: nem-alarm
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_TYPE=alarm
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - nem-network

  compute:
    build:
      context: .
      dockerfile: Dockerfile.compute
    container_name: nem-compute
    depends_on:
      - redis
      - postgres
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_TYPE=compute
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - nem-network

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai-service
    container_name: nem-ai-service
    depends_on:
      - redis
      - postgres
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_TYPE=ai-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - nem-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: nem-scheduler
    depends_on:
      - redis
      - postgres
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_TYPE=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=nem_system
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - nem-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nem-frontend
    ports:
      - "80:80"
    depends_on:
      - api-server
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - nem-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: nem-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - nem-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: nem-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - nem-network

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:

networks:
  nem-network:
    name: nem-network
    driver: bridge
