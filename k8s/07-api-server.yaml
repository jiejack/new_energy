apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: nem-system
  labels:
    app: api-server
spec:
  ports:
  - port: 8080
    name: http
  selector:
    app: api-server
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: nem-system
  labels:
    app: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: api-server
        image: nem/api-server:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: nem-config
              key: TZ
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: nem-config
              key: GIN_MODE
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: db-port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: db-password
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: nem-config
              key: DB_NAME
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: redis-port
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: kafka-brokers
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: jwt-secret
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-server-hpa
  namespace: nem-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
