apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-energy-monitoring
  labels:
    app: new-energy-monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: new-energy-monitoring
  template:
    metadata:
      labels:
        app: new-energy-monitoring
    spec:
      containers:
      - name: new-energy-monitoring
        image: {{DOCKERHUB_USERNAME}}/new-energy-monitoring:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
---
apiVersion: v1
kind: Service
metadata:
  name: new-energy-monitoring
  labels:
    app: new-energy-monitoring
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: new-energy-monitoring
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: new-energy-monitoring-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: new-energy-monitoring
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
