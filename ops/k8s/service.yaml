# =============================================================================
# API Server Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nem-api-server
  namespace: new-energy-monitoring
  labels:
    app.kubernetes.io/name: new-energy-monitoring
    app.kubernetes.io/component: api-server
    app.kubernetes.io/version: "1.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: new-energy-monitoring
    app.kubernetes.io/component: api-server

---
