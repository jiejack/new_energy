apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: nem-system
  labels:
    app: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: nem/collector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: nem-config
              key: TZ
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: kafka-brokers
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: nem-secrets
              key: redis-port
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"
---
